name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without leading v (for example: 0.1.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3
        with:
          enable-cache: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version, commit, and tag
        id: release
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must be in X.Y.Z format, got: $VERSION" >&2
            exit 1
          fi

          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists" >&2
            exit 1
          fi

          python - <<'PY'
          from pathlib import Path
          import os
          import tomllib

          path = Path("pyproject.toml")
          version = os.environ["VERSION"]
          text = path.read_text()
          current = tomllib.loads(text)["project"]["version"]
          if current == version:
              print(f"pyproject.toml already has version {version}")
              raise SystemExit(0)

          lines = text.splitlines(keepends=True)
          in_project = False
          for index, line in enumerate(lines):
              stripped = line.strip()
              if stripped == "[project]":
                  in_project = True
                  continue
              if in_project and stripped.startswith("[") and stripped.endswith("]"):
                  break
              if in_project and stripped.startswith("version = "):
                  newline = "\n" if line.endswith("\n") else ""
                  lines[index] = f'version = "{version}"{newline}'
                  path.write_text("".join(lines))
                  break
          else:
              raise SystemExit("Could not find [project].version in pyproject.toml")
          PY

          uv lock

          git add pyproject.toml uv.lock
          if ! git diff --quiet; then
            echo "Unstaged generated changes remain:" >&2
            git status --short
            exit 1
          fi
          if git diff --cached --quiet; then
            echo "No version changes to commit; tagging current commit."
          else
            git commit -m "chore(release): prepare for ${TAG}"
            git push origin "HEAD:${GITHUB_REF}"
          fi

          git tag "$TAG"
          git push origin "$TAG"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    needs: prepare-release

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux
            artifact_path: dist/asic-rs-toolkit
            release_name: asic-rs-toolkit-linux
          - os: windows-latest
            artifact_name: windows
            artifact_path: dist/asic-rs-toolkit.exe
            release_name: asic-rs-toolkit-windows.exe

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --extra build

      - name: Build with PyInstaller
        run: uv run pyinstaller asic-rs-toolkit.spec

      - name: Prepare release executable
        if: runner.os == 'Linux'
        run: |
          mkdir -p release-artifacts
          chmod +x "${{ matrix.artifact_path }}"
          cp "${{ matrix.artifact_path }}" "release-artifacts/${{ matrix.release_name }}"

      - name: Prepare release executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-artifacts | Out-Null
          Copy-Item -Path "${{ matrix.artifact_path }}" -Destination "release-artifacts/${{ matrix.release_name }}" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: asic-rs-toolkit-${{ matrix.artifact_name }}
          path: release-artifacts/${{ matrix.release_name }}
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" release-artifacts/* \
            --title "$RELEASE_TAG" \
            --generate-notes
