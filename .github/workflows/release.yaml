name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, such as v0.1.0. Defaults to the current ref name."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux
            artifact_path: dist/asic-rs-toolkit
            archive_name: asic-rs-toolkit-linux.tar.gz
          - os: windows-latest
            artifact_name: windows
            artifact_path: dist/asic-rs-toolkit.exe
            archive_name: asic-rs-toolkit-windows.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --extra build

      - name: Build with PyInstaller
        run: uv run pyinstaller asic-rs-toolkit.spec

      - name: Archive Linux executable
        if: runner.os == 'Linux'
        run: |
          mkdir -p release-artifacts
          chmod +x "${{ matrix.artifact_path }}"
          tar -czf "release-artifacts/${{ matrix.archive_name }}" -C dist asic-rs-toolkit

      - name: Archive Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-artifacts | Out-Null
          Compress-Archive -Path "${{ matrix.artifact_path }}" -DestinationPath "release-artifacts/${{ matrix.archive_name }}" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: asic-rs-toolkit-${{ matrix.artifact_name }}
          path: release-artifacts/${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Resolve release tag
        id: release_tag
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          if [ -z "$tag" ]; then
            echo "Release tag is required." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-artifacts/* --clobber
          else
            gh release create "$RELEASE_TAG" release-artifacts/* \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi
